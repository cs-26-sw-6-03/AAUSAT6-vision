orb:
  n_features: 300
  detect_every: 300

optical_flow:
    win_size: 11
    pyr_levels: 2
 

stabilizer:
  reproj_threshold: 5.0   # estimateAffinePartial2D RANSAC threshold (pixels)
  smoothing: 0.05          # EMA alpha (lower = smoother, typical: 0.03-0.10)
  max_iterations: 500

telemetry:
    enabled: true
    file: "max-efficiency.jsonl"
