pipeline:
  queue_size: 32          # Max frames buffered per stage queue

input:
  source: ""              # File path or GStreamer pipeline string (required)
  loop: false             # Reopen source when it ends (useful for file inputs)

pictures:
  path: "/tmp/vision"    # Directory of reference images, scanned recursively at runtime
  refresh_interval_s: 5  # How often (seconds) to re-scan for new reference images

optical_flow:
  win_size: 41
  pyr_levels: 5
  max_corners: 200
  quality_level: 0.01
  min_distance: 10.0
  tracking_threshold: 0.75   # Fraction of points that must be tracked
  redetect_interval: 30      # Force ORB redetect every N frames regardless

orb:
  n_features: 1000
  scale_factor: 1.2
  n_levels: 8
  edge_threshold: 31
  patch_size: 31
  min_matches: 8          # Minimum good matches after ratio test to count as a valid detection
  detect_every: 60         # Run detection every N frames; skipped frames pass to optical flow for continued tracking

matching:
  hamming_ratio_test: 0.75   # Lowe's ratio test threshold
  cross_check: false

ransac:
  method: EG_RANSAC          # RANSAC | EG_RANSAC | USAC_MAGSAC
  reproj_threshold: 3.0
  confidence: 0.99
  max_iterations: 2000

pose:
  enabled: true
  queue_size: 1          # Input queue depth (keep at 1 to avoid stale pose data)
  MIN_GOOD_MATCHES: 8
  ALPHA: 0.4
  lastvalid: false
  crop_width: 1920       # Pixels. 0 = disabled. Must be smaller than source width.
  crop_height: 1080      # Pixels. 0 = disabled. Must be smaller than source height.

output:
  #gstreamer_pipeline: "appsrc ! videoconvert ! autovideosink"
  width: 1920
  height: 1080
  fps: 30
  bitrate: 2000          # Encoder bitrate in kbps (applies to x264enc and vpuenc_h264)
  mode: "file"
  file:
    path: "output.mp4"
    encoder: "x264enc"
    muxer: "mp4mux"


db:
  path: "data/keypoints.db"

logging:
  level: info                # debug | info | warn | error
  file: ""                   # Empty = stdout only

telemetry:
  enabled: false
  file: "/tmp/telemetry.jsonl"
